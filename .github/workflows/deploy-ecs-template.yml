name: Deploy ECS Service Template

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
        description: "Name of the service (e.g., api-gateway-service)"
      ecr_repository:
        required: true
        type: string
        description: "Name of the ECR repository"
      container_name:
        required: true
        type: string
        description: "Name of the container in the task definition"

# Require write permission on id-token for OIDC authentication
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ECS_CLUSTER: tradepulse-cluster

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -pl services/${{ inputs.service_name }} -am -DskipTests

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::793314586131:role/GitHubActionsOIDCRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --build-arg JAR_FILE=services/${{ inputs.service_name }}/target/*.jar -t $ECR_REGISTRY/${{ inputs.ecr_repository }}:$IMAGE_TAG -f services/${{ inputs.service_name }}/Dockerfile .
          docker push $ECR_REGISTRY/${{ inputs.ecr_repository }}:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/${{ inputs.ecr_repository }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/${{ inputs.service_name }}-task-def.json
          container-name: ${{ inputs.container_name }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ inputs.service_name }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
