name: Deploy Services

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'services/api-gateway-service/**'
      - 'services/auth-service/**'
      - '.github/workflows/deploy-ecs-template.yml'
      - '.github/workflows/deploy-services.yml'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      auth-service: ${{ steps.filter.outputs.auth-service }}
      common: ${{ steps.filter.outputs.common }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            common:
              - 'shared/**'
              - 'infrastructure/**'
              - '.github/workflows/**'
              - 'pom.xml'
            api-gateway:
              - 'services/api-gateway-service/**'
            auth-service:
              - 'services/auth-service/**'

  deploy-api-gateway:
    name: Deploy API Gateway
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.api-gateway == 'true' || needs.detect-changes.outputs.common == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/deploy-ecs-template.yml
    with:
      service_name: 'api-gateway-service'
      ecs_service_name: 'tradepulse-api-gateway'
      ecr_repository: 'tradepulse-api-gateway'
      container_name: 'tradepulse-api-gateway-app'

  deploy-auth-service:
    name: Deploy Auth Service
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.auth-service == 'true' || needs.detect-changes.outputs.common == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/deploy-ecs-template.yml
    with:
      service_name: 'auth-service'
      ecs_service_name: 'tradepulse-auth-service'
      ecr_repository: 'tradepulse-auth-service'
      container_name: 'tradepulse-auth-service-app'
