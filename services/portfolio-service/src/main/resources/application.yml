spring:
  application:
    name: portfolio-service

  datasource:
    url: jdbc:postgresql://localhost:5432/tradepulse_portfolio
    username: ${DB_USERNAME:tradepulse}
    password: ${DB_PASSWORD:tradepulse}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:tradepulse}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: portfolio-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.tradepulse.*"

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVICE_JWKS_URI:http://localhost:8081/api/auth/.well-known/jwks.json}

server:
  port: 8085
  servlet:
    context-path: /api/portfolio
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

market-data:
  service-url: ${MARKET_DATA_SERVICE_URL:http://localhost:8084}

logging:
  level:
    com.tradepulse: DEBUG
