spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/tradepulse_auth
    username: ${DB_USERNAME:tradepulse}
    password: ${DB_PASSWORD:tradepulse}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        ddl-auto: update
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:tradepulse}
      lettuce:
        pool:
          max-active: 10

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,email,profile

server:
  port: 8081
  servlet:
    context-path: /api/auth

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

jwt:
  # RSA key pair loaded from AWS Secrets Manager in production
  # For local dev, keys can be supplied via environment variables
  private-key-secret: ${JWT_PRIVATE_KEY_SECRET:tradepulse/jwt/private-key}
  public-key-secret: ${JWT_PUBLIC_KEY_SECRET:tradepulse/jwt/public-key}
  access-token-expiry-minutes: 15
  refresh-token-expiry-days: 7

logging:
  level:
    com.tradepulse: DEBUG
    org.springframework.security: INFO
